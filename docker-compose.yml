services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-release_notifier}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-release_notifier}"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "${DB_PORT:-5432}:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # notifier-svc: gRPC notification microservice. INTERNAL ONLY — no published
  # port. Reuses the shared image; runs the notifier binary. Owns SMTP only;
  # email links arrive pre-rendered from the core. Admin HTTP (:8081) serves
  # /health (compose gating) + /metrics (Prometheus).
  notifier:
    build: .
    image: repo-release-notifier:latest
    command: ["/app/notifier"]
    restart: unless-stopped
    # Exceeds the app's bounded drain (8s gRPC + 10s admin) so SIGKILL never
    # interrupts an in-flight shutdown.
    stop_grace_period: 20s
    environment:
      NOTIFIER_GRPC_ADDR: ":50051"
      ADMIN_ADDR: ":8081"
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-internal-token}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-text}
    healthcheck:
      # wget ships in alpine:3.20 (busybox). Hits the admin server's /health.
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  # core: user-facing HTTP API + scanner poll loop. Dials notifier over gRPC.
  app:
    build: .
    image: repo-release-notifier:latest
    command: ["/app/server"]
    restart: unless-stopped
    # Covers the HTTP server's 15s graceful shutdown timeout.
    stop_grace_period: 20s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      notifier:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-release_notifier}
      DB_SSLMODE: disable
      PORT: 8080
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SCAN_INTERVAL: ${SCAN_INTERVAL:-5m}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      NOTIFIER_ADDR: ${NOTIFIER_ADDR:-notifier:50051}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-internal-token}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-text}
    ports:
      - "${PORT:-8080}:8080"

volumes:
  pgdata:
