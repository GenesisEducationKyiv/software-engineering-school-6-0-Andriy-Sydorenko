services:
  # --- per-service databases (no shared DB: each service owns its own) ------
  db-subscription:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: subscription
    volumes:
      - pgdata-subscription:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d subscription"]
      interval: 5s
      timeout: 3s
      retries: 10

  db-catalog:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: catalog
    volumes:
      - pgdata-catalog:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d catalog"]
      interval: 5s
      timeout: 3s
      retries: 10

  db-orchestrator:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: orchestrator
    volumes:
      - pgdata-orchestrator:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d orchestrator"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "${NATS_PORT:-4222}:4222"

  # --- orchestrator: front door for the subscribe saga ----------------------
  orchestrator:
    build:
      context: .
      target: orchestrator
    restart: unless-stopped
    depends_on:
      db-orchestrator:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      DB_HOST: db-orchestrator
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: orchestrator
      DB_SSLMODE: disable
      PORT: 8090
      NATS_URL: nats://nats:4222
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    ports:
      - "${ORCHESTRATOR_PORT:-8090}:8090"

  # --- subscription service: confirm/unsubscribe API + saga participant -----
  app:
    build:
      context: .
      target: app
    restart: unless-stopped
    depends_on:
      db-subscription:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      DB_HOST: db-subscription
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: subscription
      DB_SSLMODE: disable
      PORT: 8080
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      NATS_URL: nats://nats:4222
      API_KEY: ${API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    ports:
      - "${PORT:-8080}:8080"

  # --- catalog: repo registry + scanner + saga participant ------------------
  catalog:
    build:
      context: .
      target: catalog
    restart: unless-stopped
    depends_on:
      db-catalog:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      DB_HOST: db-catalog
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: catalog
      DB_SSLMODE: disable
      ADMIN_PORT: 9092
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      NATS_URL: nats://nats:4222
      SCAN_INTERVAL: ${SCAN_INTERVAL:-5m}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}

  notifier:
    build:
      context: .
      target: notifier
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
    environment:
      NATS_URL: nats://nats:4222
      ADMIN_ADDR: ":9091"
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}

volumes:
  pgdata-subscription:
  pgdata-catalog:
  pgdata-orchestrator:
