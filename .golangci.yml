version: "2"

linters:
  enable:
    # Bugs & correctness
    - errcheck
    - govet
    - staticcheck
    - bodyclose
    - durationcheck
    - errorlint
    - nilerr
    - sqlclosecheck

    # Unused code
    - unused
    - ineffassign
    - unparam

    # Style & clarity
    - gocritic
    - misspell
    - revive
    - whitespace

    # Complexity
    - cyclop
    - gocognit
    - funlen

    # Security
    - gosec

    # Performance
    - prealloc

  settings:
    cyclop:
      max-complexity: 15
    gocognit:
      min-complexity: 20
    funlen:
      lines: 80
      statements: 50
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: var-declaration
        - name: var-naming
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - unnecessaryBlock
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*net/http.Response).Body.Close

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/Andriy-Sydorenko/repo-release-notifier

output:
  sort-order:
    - file

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
