<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Subscribe to GitHub release notifications</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           max-width: 32rem; margin: 3rem auto; padding: 0 1rem; line-height: 1.5; }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    p.lede { color: #666; margin-top: 0; }
    label { display: block; margin-top: 1rem; font-weight: 600; }
    input { width: 100%; padding: 0.6rem 0.75rem; font-size: 1rem;
            border: 1px solid #bbb; border-radius: 6px; box-sizing: border-box; }
    input:focus { outline: 2px solid #2da44e; outline-offset: 1px; }
    button { margin-top: 1.25rem; padding: 0.7rem 1rem; font-size: 1rem; font-weight: 600;
             background: #2da44e; color: #fff; border: 0; border-radius: 6px; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: wait; }
    .hint { color: #666; font-size: 0.85rem; margin-top: 0.25rem; }
    .status { margin-top: 1rem; padding: 0.75rem 1rem; border-radius: 6px; display: none; }
    .status.ok  { display: block; background: #e6f7ed; color: #1a7f37; }
    .status.err { display: block; background: #ffeef0; color: #cf222e; }
  </style>
</head>
<body>
  <h1>Subscribe to GitHub release notifications</h1>
  <p class="lede">Get an email whenever a repository publishes a new release.</p>

  <form id="f">
    <label for="email">Your email</label>
    <input id="email" name="email" type="email" required autocomplete="email" placeholder="you@example.com">

    <label for="repo">GitHub repository</label>
    <input id="repo" name="repo" required autocomplete="off" placeholder="golang/go" pattern="[A-Za-z0-9._\-]+/[A-Za-z0-9._\-]+">
    <div class="hint">Format: <code>owner/repo</code> — e.g. <code>golang/go</code>.</div>

    <label for="apikey">API key <span style="font-weight:400;color:#666">(optional — only if the server requires one)</span></label>
    <input id="apikey" name="apikey" type="password" autocomplete="off">

    <button id="go" type="submit">Subscribe</button>
  </form>

  <div id="status" class="status" role="status" aria-live="polite"></div>

  <script>
  const form = document.getElementById('f');
  const btn  = document.getElementById('go');
  const box  = document.getElementById('status');

  function show(msg, ok) {
    box.textContent = msg;
    box.className = 'status ' + (ok ? 'ok' : 'err');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    btn.disabled = true; show('Sending…', true);

    const headers = { 'Content-Type': 'application/json' };
    const key = document.getElementById('apikey').value.trim();
    if (key) headers['X-API-Key'] = key;

    const body = JSON.stringify({
      email: document.getElementById('email').value.trim(),
      repo:  document.getElementById('repo').value.trim(),
    });

    try {
      const res  = await fetch('/api/subscribe', { method: 'POST', headers, body });
      const data = await res.json().catch(() => ({}));
      if (res.ok) {
        show('Check your inbox — we just sent a confirmation email.', true);
        form.reset();
      } else {
        show(data.error || `Failed (${res.status})`, false);
      }
    } catch (err) {
      show('Network error — try again.', false);
    } finally {
      btn.disabled = false;
    }
  });
  </script>
</body>
</html>
