# E2E stack: real Postgres + the e2e-server binary (stubbed GitHub,
# stdout mailer). Playwright targets http://localhost:8080 on the host.
#
# Usage:
#   docker compose -f docker-compose.e2e.yml up --build -d
#   (cd e2e && npm ci && npx playwright test)
#   docker compose -f docker-compose.e2e.yml down -v

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d test"]
      interval: 1s
      timeout: 3s
      retries: 30

  app:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    environment:
      DB_HOST: postgres
      DB_USER: test
      DB_PASSWORD: test
      DB_NAME: test
      # No API key — the subscribe page works without one in E2E.
      API_KEY: ""
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
