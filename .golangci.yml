version: "2"

linters:
  enable:
    # Bugs & correctness
    - errcheck
    - govet
    - staticcheck
    - bodyclose
    - durationcheck
    - errorlint
    - nilerr
    - sqlclosecheck

    # Unused code
    - unused
    - ineffassign
    - unparam

    # Style & clarity
    - gocritic
    - misspell
    - revive
    - whitespace

    # Complexity
    - cyclop
    - gocognit
    - funlen

    # Security
    - gosec

    # Performance
    - prealloc

    # Imports / module boundaries
    - depguard

  settings:
    cyclop:
      max-complexity: 15
    gocognit:
      min-complexity: 20
    funlen:
      lines: 80
      statements: 50
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: var-declaration
        - name: var-naming
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - unnecessaryBlock
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*net/http.Response).Body.Close
    depguard:
      rules:
        app-not-notifier-core:
          files:
            - "**/internal/app/**"
            - "**/cmd/app/**"
          deny:
            - pkg: github.com/Andriy-Sydorenko/repo-release-notifier/internal/notifier
              desc: "app and notifier communicate via NATS (internal/shared/notify + natsbus); the app must not import the notifier service-core"

  exclusions:
    rules:
      # slog.Handler.Handle (and test helpers mirroring it) take slog.Record by
      # value per the stdlib interface contract; gocritic hugeParam is a false
      # positive there.
      - path: internal/shared/observability/logging
        linters:
          - gocritic
        text: hugeParam
      # Test fixtures use throwaway credential-like literals; gosec G101 is noise.
      - path: _test\.go
        linters:
          - gosec
        text: G101

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/Andriy-Sydorenko/repo-release-notifier

output:
  sort-order:
    - file

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
