name: Integration tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: testcontainers + Postgres
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - name: Download modules
        run: go mod download
      - name: Run integration tests
        # Docker is preinstalled on ubuntu-latest runners; testcontainers
        # boots a real Postgres for each package run. The `integration`
        # tag isolates these from the unit pipeline.
        run: go test -tags=integration -timeout=5m -count=1 ./internal/integration/...
